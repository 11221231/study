<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>STUDY</title>
  <style>
    :root {
      --sidebar-width: 280px;
      --primary: #2563eb;
      --dark: #0f172a;
      --header-height: 60px;
    }
    body, html { margin: 0; padding: 0; height: 100%; font-family: sans-serif; background: #f8fafc; overflow: hidden; }

    /* 상단 헤더 (모바일 전용) */
    .mobile-header { display: none; height: var(--header-height); background: var(--dark); color: white; align-items: center; padding: 0 20px; position: fixed; top: 0; left: 0; right: 0; z-index: 100; justify-content: space-between; }

    .container { display: flex; height: 100vh; }

    /* 사이드바 */
    .sidebar { width: var(--sidebar-width); background: var(--dark); color: white; display: flex; flex-direction: column; transition: transform 0.3s ease; z-index: 1000; }
    .brand { padding: 30px 25px; font-size: 1.2rem; font-weight: bold; color: #60a5fa; border-bottom: 1px solid #1e293b; }
    
    /* 자동 생성될 메뉴 영역 */
    .nav-menu { flex: 1; overflow-y: auto; padding: 10px 0; }
    .nav-item { padding: 15px 25px; cursor: pointer; color: #94a3b8; border-left: 4px solid transparent; transition: 0.2s; }
    .nav-item:hover { background: #1e293b; color: white; }
    .nav-item.active { background: #1e293b; color: white; border-left-color: var(--primary); }
    .nav-item span { display: block; font-size: 0.9rem; word-break: break-all; }

    /* 로딩 애니메이션 */
    .loading { padding: 20px; font-size: 0.8rem; color: #4b5563; text-align: center; }

    .main-content { flex: 1; position: relative; }
    iframe { width: 100%; height: 100%; border: none; }

    @media (max-width: 768px) {
      .mobile-header { display: flex; }
      .sidebar { position: fixed; left: 0; top: 0; bottom: 0; transform: translateX(-100%); }
      .sidebar.open { transform: translateX(0); }
      .main-content { padding-top: var(--header-height); }
      .overlay { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5); z-index: 999; }
      .overlay.show { display: block; }
    }
    .menu-toggle { background: none; border: none; color: white; font-size: 1.5rem; cursor: pointer; }
  </style>
</head>
<body>

<header class="mobile-header">
  <div style="font-weight: bold; color: #60a5fa;">STUDY</div>
  <button class="menu-toggle" onclick="toggleSidebar()">☰</button>
</header>

<div class="overlay" id="overlay" onclick="toggleSidebar()"></div>

<div class="container">
  <nav class="sidebar" id="sidebar">
      <div class="brand">STUDY</div>
    <div class="nav-menu" id="dynamicMenu">
      <div class="loading">파일 목록 불러오는 중...</div>
    </div>
  </nav>

  <main class="main-content">
    <iframe id="contentFrame" src=""></iframe>
  </main>
</div>

<script>
  const USERNAME = "11221231";
  const REPO = "study";

  async function loadFileList() {
    const menuContainer = document.getElementById('dynamicMenu');
    try {
      const response = await fetch(`https://api.github.com/repos/${USERNAME}/${REPO}/contents/`);
      const files = await response.json();

      // 수정 포인트 1: fileName (소문자) vs filename (오타) 수정
      // 수정 포인트 2: .toLowerCase()를 사용하여 .HTML 대문자 확장자도 인식하도록 보완
      const htmlFiles = files.filter(file => {
          const lowerName = file.name.toLowerCase(); 
          return lowerName.endsWith('.html') && lowerName !== 'index.html';
      });

      menuContainer.innerHTML = ''; 

      if (htmlFiles.length === 0) {
        menuContainer.innerHTML = '<div class="loading">HTML 파일이 없습니다.</div>';
        return;
      }

      htmlFiles.forEach((file, index) => {
        const div = document.createElement('div');
        div.className = `nav-item ${index === 0 ? 'active' : ''}`;
        
        // 파일명에서 확장자 제거 (.html 또는 .HTML 모두 대응)
        const displayName = file.name.replace(/\.html$/i, '').replace(/_/g, ' ');
        
        div.innerHTML = `<span>${displayName}</span>`;
        div.onclick = () => changePage(div, file.name);
        menuContainer.appendChild(div);

        if (index === 0) {
          document.getElementById('contentFrame').src = file.name;
        }
      });
    } catch (error) {
      menuContainer.innerHTML = '<div class="loading">목록을 불러오지 못했습니다.</div>';
      console.error(error);
    }
  }

  function toggleSidebar() {
    document.getElementById('sidebar').classList.toggle('open');
    document.getElementById('overlay').classList.toggle('show');
  }

  function changePage(el, url) {
    document.getElementById('contentFrame').src = url;
    document.querySelectorAll('.nav-item').forEach(item => item.classList.remove('active'));
    el.classList.add('active');
    if (window.innerWidth <= 768) toggleSidebar();
  }

  loadFileList();
</script>

</body>
</html>
